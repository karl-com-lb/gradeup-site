<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Page Not Found</title>
  <style>
    /* General reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f0f4ff, #d9e2ff);
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    /* Logo */
    .logo {
      width: 120px;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 120px;
      color: #ff4c4c;
      animation: bounce 1.2s infinite;
    }

    p {
      font-size: 24px;
      margin-bottom: 30px;
      max-width: 500px;
      line-height: 1.4;
    }

    a.button {
      display: inline-block;
      padding: 15px 30px;
      background-color: #0072ff;
      color: white;
      font-size: 18px;
      border-radius: 8px;
      text-decoration: none;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }

    a.button:hover {
      background-color: #005bb5;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .contact {
      margin-top: 40px;
      font-size: 16px;
      color: #555;
      max-width: 400px;
    }

    .contact a {
      color: #0072ff;
      text-decoration: none;
    }

    /* Bounce animation for 404 */
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-20px); }
      60% { transform: translateY(-10px); }
    }

    /* Responsive adjustments */
    @media(max-width: 500px){
      h1 { font-size: 80px; }
      p { font-size: 20px; }
      a.button { font-size: 16px; padding: 12px 25px; }
    }
  </style>
</head>
<body>
  <!-- Logo -->
  <img src="logo.png" alt="GradeUp Logo" class="logo">

  <!-- Animated 404 -->
  <h1>404</h1>
  <p>Oops! The page you are looking for doesn’t exist or may have been moved.</p>
  
  <!-- Homepage button -->
  <a href="/" class="button">Go Back to Homepage</a>
  
  <!-- IT contact -->
  <div class="contact">
    If you think this is a mistake, please contact our IT department at 
    <a href="mailto:it.dept@gradeuplb.online">it.dept@gradeuplb.online</a>
  </div>
</body>
</html>
