<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hire a Tutor | Grade Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Poppins', sans-serif; background: #f4f7fb; color: #1e2a38; margin:0; padding:0; }
header { display:flex; justify-content:space-between; align-items:center; padding:15px 10%; background:white; position:sticky; top:0; z-index:1000; }
header img { height:80px; }
nav a { margin-left:20px; text-decoration:none; color:#1e2a38; }
.hero { text-align:center; padding:80px 10%; background: linear-gradient(to right, #eaf3ff, #ffffff); }
.hero h1 { font-size:38px; margin-bottom:15px; }
.hero p { color:#555; margin-bottom:20px; }
.tutor-container { display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:30px; padding:40px 10%; }
.card { background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.05); text-align:center; }
.card img { width:150px; height:150px; border-radius:50%; object-fit:cover; margin-bottom:15px; }
.card h3 { margin-bottom:8px; }
.card p { margin-bottom:8px; font-size:14px; color:#555; }
.card button { background:#0d4c6b; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; }
footer { background:#0d4c6b; color:white; text-align:center; padding:25px; margin-top:50px; }
</style>
</head>
<body>

<header>
  <img src="logo.png" alt="Grade Up Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About Us</a>
    <a href="find-tutor.html">Find a Tutor</a>
    <a href="become-tutor.html">Become a Tutor</a>
    <a href="terms.html">Terms & Conditions</a>
    <a href="contact.html">Contact Us</a>
  </nav>
</header>

<section class="hero">
  <h1>Hire a Tutor</h1>
  <p>Select a tutor to start your request process.</p>
</section>

<div class="tutor-container" id="tutor-list">
  <!-- Tutor cards will load here automatically -->
</div>

<footer>
  <p>© 2026 Grade Up | Lebanon</p>
</footer>

<script>
// Store tutors loaded from JSON
let allTutors = [];

// Load tutors
fetch('tutors.json')
  .then(res => res.json())
  .then(tutors => {
    allTutors = tutors;
    displayTutors(tutors);
  });

// Display tutor cards without price/comment
function displayTutors(tutors) {
  const container = document.getElementById('tutor-list');
  container.innerHTML = '';
  tutors.forEach(tutor => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${tutor.photo}" alt="${tutor.name}">
      <h3>${tutor.name}</h3>
      <p><strong>Subjects:</strong> ${tutor.subjects}</p>
      <p><strong>Type:</strong> ${tutor.type}</p>
      <button onclick="requestTutor('${tutor.name}')">Hire this Tutor</button>
    `;
    container.appendChild(card);
  });
}

// Redirect to request form
function requestTutor(name) {
  window.location.href = `request.html?tutor=${encodeURIComponent(name)}`;
}
</script>

</body>
</html>
